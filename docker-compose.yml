services:
  postgres:
    image: postgres:16-alpine
    container_name: formulary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-formulary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-formulary}
      POSTGRES_DB: ${POSTGRES_DB:-formularycheck}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: formulary-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formulary-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://formulary:formulary@postgres:5432/formularycheck?sslmode=disable
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      APP_ENV: ${APP_ENV:-development}
    depends_on:
      - postgres

volumes:
  pgdata:
  miniodata:
